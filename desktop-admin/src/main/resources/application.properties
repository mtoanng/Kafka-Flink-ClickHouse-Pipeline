# =========================================================
# VES Admin Desktop — runtime config
# Override qua env vars (DB_URL, DB_USER, DB_PASSWORD)
# hoặc -Dapp.config=path/to/external.properties khi launch.
# =========================================================

# Postgres (mặc định match infra/docker-compose.yml: fuel_prices / postgres / 123456)
db.url=jdbc:postgresql://localhost:5432/fuel_prices
db.user=postgres
db.password=123456

# Connection pool (HikariCP-style settings — dùng raw JDBC nên chỉ informational)
db.connection.timeout.ms=5000
db.query.timeout.s=10

# UI defaults
ui.refresh.interval.s=30
ui.locale=vi
