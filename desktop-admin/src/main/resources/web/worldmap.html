<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>VES-Monitor · World Fuel Hubs</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="worldmap.css" />
</head>
<body>
    <div id="map"></div>
    <div id="offline-overlay" hidden>
        <div class="offline-card">
            <div class="offline-title">World map offline</div>
            <div class="offline-msg">Tile CDN unreachable — likely behind a proxy.<br/>
                Markers and prices are still available below.</div>
            <ul id="offline-list"></ul>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
    /* eslint-disable no-undef */
    (function () {
        // Hub locations — the fuel benchmarks our pipeline tracks.
        var HUBS = [
            { code: 'WTI_HOUSTON', name: 'Houston (WTI hub)',  lat: 29.7604, lng: -95.3698 },
            { code: 'WTI_NY',      name: 'New York (NYMEX)',   lat: 40.7128, lng: -74.0060 },
            { code: 'BRENT_LDN',   name: 'London (Brent / ICE)', lat: 51.5074, lng: -0.1278 },
            { code: 'BRENT_DXB',   name: 'Dubai (Middle East)', lat: 25.2048, lng: 55.2708 },
            { code: 'ASIA_SGP',    name: 'Singapore (Asia hub)', lat: 1.3521,  lng: 103.8198 },
            { code: 'VN_HAIPHONG', name: 'Hải Phòng (VN port)', lat: 20.8449, lng: 106.6881 },
            { code: 'VN_VUNGTAU',  name: 'Vũng Tàu (VN port)',  lat: 10.3460, lng: 107.0843 }
        ];

        var map = null;
        var markersByCode = {};

        function initMap() {
            map = L.map('map', { worldCopyJump: true }).setView([10, 100], 3);
            var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 8,
                attribution: '© OpenStreetMap contributors'
            });
            tileLayer.on('tileerror', function () {
                document.getElementById('offline-overlay').hidden = false;
            });
            tileLayer.addTo(map);

            HUBS.forEach(function (hub) {
                var marker = L.circleMarker([hub.lat, hub.lng], {
                    radius: 7,
                    color: '#1976D2',
                    fillColor: '#42A5F5',
                    fillOpacity: 0.85,
                    weight: 2
                }).addTo(map);
                marker.bindPopup('<b>' + hub.name + '</b><br/>Waiting for prices…');
                markersByCode[hub.code] = { marker: marker, hub: hub };
                addOfflineRow(hub);
            });
        }

        function addOfflineRow(hub) {
            var li = document.createElement('li');
            li.id = 'offline-' + hub.code;
            li.textContent = hub.name + ' — no data';
            document.getElementById('offline-list').appendChild(li);
        }

        /**
         * Public API for Java -> JS bridge.
         * jsonString should be a JSON array of { code, price, delta_pct, fuel_type }.
         */
        window.updateMarkers = function (jsonString) {
            try {
                var payload = typeof jsonString === 'string' ? JSON.parse(jsonString) : jsonString;
                if (!Array.isArray(payload)) return;
                payload.forEach(function (row) {
                    var entry = markersByCode[row.code];
                    if (!entry) return;
                    var color = '#1976D2';
                    if (typeof row.delta_pct === 'number') {
                        color = row.delta_pct >= 1.5 ? '#C62828'
                              : row.delta_pct <= -1.5 ? '#2E7D32' : '#1976D2';
                    }
                    entry.marker.setStyle({ color: color, fillColor: color });
                    var price = row.price !== undefined ? row.price : '--';
                    var fuel = row.fuel_type || '';
                    var delta = row.delta_pct !== undefined
                        ? ' (' + (row.delta_pct >= 0 ? '+' : '') + row.delta_pct.toFixed(2) + '%)'
                        : '';
                    entry.marker.setPopupContent(
                        '<b>' + entry.hub.name + '</b><br/>' +
                        fuel + '<br/>' +
                        'Price: ' + price + delta);
                    var off = document.getElementById('offline-' + row.code);
                    if (off) {
                        off.textContent = entry.hub.name + ' — ' + fuel + ' ' + price + delta;
                    }
                });
            } catch (e) {
                console.error('updateMarkers parse error', e);
            }
        };

        if (typeof L === 'undefined') {
            document.getElementById('offline-overlay').hidden = false;
        } else {
            initMap();
        }
    })();
    </script>
</body>
</html>
