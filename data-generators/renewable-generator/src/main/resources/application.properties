# =====================================================================
# Renewable + Emission Generator (Pillar 4)
# =====================================================================
kafka.bootstrap.servers=localhost:9092
kafka.topic.renewable=renewable-output
kafka.topic.emission=emission

# Renewable output: 10s/tick × 9 records = ~0.9 record/s
producer.renewable.interval.ms=10000

# Emission: tổng hợp mỗi 30s × 3 records
producer.emission.interval.ms=30000
