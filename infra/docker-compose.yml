# =============================================================
#  VES Real-time Fuel Price Monitoring — Docker Compose (LITE)
#  Memory budget: ~2.85 GB total (Lite, không Metabase)
#    Zookeeper       256 MB
#    Kafka           640 MB
#    PostgreSQL      512 MB
#    Flink JobMgr    640 MB    (metaspace ép xuống 96m)
#    Flink TaskMgr   800 MB    (metaspace ép xuống 96m)
#    Metabase       ~800 MB    (NẾU dùng overlay docker-compose.bi.yml)
#  Run:
#    docker compose -f infra/docker-compose.yml --env-file .env up -d
#  Run với Metabase (BI):
#    docker compose -f infra/docker-compose.yml -f infra/docker-compose.bi.yml ...
# =============================================================

services:
  # ═══════════════════════════════════════════════════
  # ZOOKEEPER — Quản lý metadata cho Kafka  (Mem: 256 MB)
  # ═══════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Giới hạn JVM heap 192MB → tiết kiệm so với mặc định ~512MB
      KAFKA_HEAP_OPTS: "-Xms128M -Xmx192M"
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_logs:/var/lib/zookeeper/log
    networks:
      - realtime_network
    mem_limit: 256m
    mem_reservation: 192m
    healthcheck:
      test: ["CMD", "zookeeper-shell", "localhost:2181", "ls", "/"]
      interval: 30s
      timeout: 20s
      retries: 10

  # ═══════════════════════════════════════════════════
  # KAFKA — Message broker  (Mem: 640 MB | JVM heap: 512 MB)
  # ═══════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST  → kết nối từ máy host  (localhost:9092)
      # PLAINTEXT       → kết nối nội bộ Docker  (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      # Giới hạn JVM heap: -Xms256 -Xmx512 (mặc định Confluent là 1GB)
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx512M"
      # Giảm log segment size để giảm RAM cho page cache
      KAFKA_LOG_SEGMENT_BYTES: 67108864       # 64 MB segments (default 1 GB)
      KAFKA_LOG_RETENTION_BYTES: 268435456    # giữ tối đa 256 MB/partition
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - realtime_network
    mem_limit: 640m
    mem_reservation: 512m
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════
  # POSTGRESQL — Lưu trữ dữ liệu đã xử lý  (Mem: 512 MB)
  # ═══════════════════════════════════════════════════
  postgresql:
    image: postgres:15
    container_name: postgres-database
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-fuel_prices}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Tất cả *.sql trong thư mục script/ sẽ chạy tự động khi container start lần đầu
      - ./script:/docker-entrypoint-initdb.d
    networks:
      - realtime_network
    # Postgres tự dùng RAM cho shared_buffers + work_mem.
    # Default shared_buffers=128MB là OK cho dev. mem_limit 512 dư phòng cache.
    mem_limit: 512m
    mem_reservation: 256m
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "max_connections=50"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fuel_prices}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════
  # FLINK JOBMANAGER — Điều phối stream jobs  (Mem: 640 MB)
  # ═══════════════════════════════════════════════════
  # Flink memory model: process = flink + metaspace + overhead.
  # Mặc định metaspace=256m. Ép xuống 96m để Lite Profile.
  flink-jobmanager:
    image: flink:1.17.0-scala_2.12-java11
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "${FLINK_UI_PORT:-8081}:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.rpc.port: 6124
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        # JM process 600m: heap ~256m + offheap 128m + metaspace 96m + overhead 60m
        jobmanager.memory.process.size: 600m
        jobmanager.memory.jvm-metaspace.size: 96m
        web.upload.dir: /tmp/flink-web-upload
    volumes:
      - flink_data:/tmp/flink
    networks:
      - realtime_network
    mem_limit: 640m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════
  # FLINK TASKMANAGER — Xử lý stream data  (Mem: 800 MB)
  # ═══════════════════════════════════════════════════
  flink-taskmanager:
    image: flink:1.17.0-scala_2.12-java11
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.rpc.port: 6124
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        # TM process 768m: heap 256m + managed 128m + network 64m + offheap 128m + metaspace 96m + overhead 96m
        taskmanager.memory.process.size: 768m
        taskmanager.memory.jvm-metaspace.size: 96m
        taskmanager.memory.managed.size: 128m
        taskmanager.memory.network.min: 32m
        taskmanager.memory.network.max: 64m
    volumes:
      - flink_data:/tmp/flink
    networks:
      - realtime_network
    mem_limit: 800m
    mem_reservation: 640m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://flink-jobmanager:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  zk_data:
  zk_logs:
  kafka_data:
  pgdata:
  flink_data:
  # metabase_data: nằm trong docker-compose.bi.yml overlay

networks:
  realtime_network:
    driver: bridge
