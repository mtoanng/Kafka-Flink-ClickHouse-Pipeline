# =============================================================
#  F1 Live Telemetry Streaming Platform — Docker Compose
#  Memory budget: ~1.8 GB containers + ~2 GB Docker overhead = ~3.8 GB
#    Kafka KRaft         768 MB
#    Schema Registry      512 MB
#    ClickHouse            512 MB
#  Flink runs in-process (IDE/Maven), not in Docker.
#  Grafana uses Grafana Cloud (free tier), not local container.
#
#  Run:
#    docker compose -f infra/docker-compose.yml up -d
#  Stop:
#    docker compose -f infra/docker-compose.yml down
# =============================================================

services:
  # ═══════════════════════════════════════════════════════
  # KAFKA KRAFT — Broker + Controller, no Zookeeper (768 MB)
  # ═══════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 67108864
      KAFKA_LOG_RETENTION_BYTES: 134217728
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms384M -Xmx512M"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - f1_network
    mem_limit: 768m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ═══════════════════════════════════════════════════════
  # SCHEMA REGISTRY — Avro schema management (512 MB)
  # ═══════════════════════════════════════════════════════
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx384M"
    networks:
      - f1_network
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ═══════════════════════════════════════════════════════
  # CLICKHOUSE — OLAP serving layer (512 MB)
  # ═══════════════════════════════════════════════════════
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - f1_network
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  kafka_data:
  clickhouse_data:

networks:
  f1_network:
    driver: bridge
