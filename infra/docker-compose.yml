name: ${COMPOSE_PROJECT_NAME:-taobao-cloud-e2e}

# Final cloud profiles:
#   core: no broker container; host processes use Confluent Cloud.
#   cdc: core plus local PostgreSQL and Debezium Connect on the EC2 host.
# ClickHouse, ScyllaDB, and Grafana remain external environment-driven services.

services:
  postgres:
    profiles: ["cdc"]
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12

  debezium-connect:
    profiles: ["cdc"]
    image: ${DEBEZIUM_CONNECT_IMAGE:-debezium/connect:2.7}
    ports:
      - "${CONNECT_EXTERNAL_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:?KAFKA_BOOTSTRAP_SERVERS is required}
      GROUP_ID: ${CONNECT_GROUP_ID:-taobao-debezium}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_TOPIC:-taobao-connect-configs}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_TOPIC:-taobao-connect-offsets}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_TOPIC:-taobao-connect-status}
      KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      KEY_CONVERTER_SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:?SCHEMA_REGISTRY_URL is required}
      VALUE_CONVERTER_SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:?SCHEMA_REGISTRY_URL is required}
      KEY_CONVERTER_BASIC_AUTH_USER_INFO: ${SCHEMA_REGISTRY_BASIC_AUTH_USER_INFO:?SCHEMA_REGISTRY_BASIC_AUTH_USER_INFO is required}
      VALUE_CONVERTER_BASIC_AUTH_USER_INFO: ${SCHEMA_REGISTRY_BASIC_AUTH_USER_INFO:?SCHEMA_REGISTRY_BASIC_AUTH_USER_INFO is required}
      REST_ADVERTISED_HOST_NAME: ${CONNECT_ADVERTISED_HOSTNAME:-localhost}
      CONNECT_PLUGIN_PATH: /kafka/connect,/kafka/connect/debezium-connector-postgresql
      CONNECT_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      CONNECT_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-PLAIN}
      CONNECT_SASL_JAAS_CONFIG: ${KAFKA_SASL_JAAS_CONFIG:?KAFKA_SASL_JAAS_CONFIG is required}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
