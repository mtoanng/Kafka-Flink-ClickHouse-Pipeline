# =============================================================
#  F1 Live Telemetry — Docker Compose (local engines only)
#  Kafka KRaft + Schema Registry. ClickHouse & Grafana are Cloud.
#  Memory: Kafka 768MB + Schema Registry 512MB = ~1.3GB + Docker overhead ~2GB
#  Run: docker compose -f infra/docker-compose.yml up -d
# =============================================================

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 67108864
      KAFKA_LOG_RETENTION_BYTES: 134217728
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms384M -Xmx512M"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - f1_network
    mem_limit: 768m
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx384M"
    networks:
      - f1_network
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  kafka_data:

networks:
  f1_network:
    driver: bridge