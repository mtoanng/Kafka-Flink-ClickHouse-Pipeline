name: ${COMPOSE_PROJECT_NAME:-taobao-runtime}

# The service-free `checks` profile is implemented by Make/CI and starts no
# containers. `core` provides local data-plane dependencies. `full` adds the
# CDC control plane and Grafana. Flink remains one externally submitted job.
services:
  kafka:
    profiles: ["core", "full"]
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.0}
    hostname: kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOSTNAME:-localhost}:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  schema-registry:
    profiles: ["core", "full"]
    image: ${SCHEMA_REGISTRY_IMAGE:-apicurio/apicurio-registry:3.2.5}
    ports:
      - "${SCHEMA_REGISTRY_EXTERNAL_PORT:-8081}:8080"
    environment:
      APICURIO_STORAGE_KIND: mem

  clickhouse:
    profiles: ["core", "full"]
    image: ${CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:24.8}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-taobao_behavior}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-local-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user $$CLICKHOUSE_USER --password $$CLICKHOUSE_PASSWORD --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 12

  cassandra:
    profiles: ["core", "full"]
    image: ${CASSANDRA_IMAGE:-cassandra:5.0}
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: taobao-local
      CASSANDRA_DC: ${CASSANDRA_DATACENTER:-datacenter1}
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cassandra:/opt/taobao/cassandra:ro
    healthcheck:
      test: ["CMD-SHELL", "cqlsh 127.0.0.1 9042 -e 'SELECT release_version FROM system.local' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  postgres:
    profiles: ["full"]
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-behavior}
      POSTGRES_USER: ${POSTGRES_USER:-debezium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-for-cdc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12

  debezium-connect:
    profiles: ["full"]
    image: ${DEBEZIUM_CONNECT_IMAGE:-quay.io/debezium/connect:3.2}
    ports:
      - "${CONNECT_EXTERNAL_PORT:-8083}:8083"
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: ${CONNECT_GROUP_ID:-taobao-debezium}
      CONFIG_STORAGE_TOPIC: ${CONNECT_CONFIG_TOPIC:-taobao-connect-configs}
      OFFSET_STORAGE_TOPIC: ${CONNECT_OFFSET_TOPIC:-taobao-connect-offsets}
      STATUS_STORAGE_TOPIC: ${CONNECT_STATUS_TOPIC:-taobao-connect-status}
      ENABLE_APICURIO_CONVERTERS: "true"
      KEY_CONVERTER: io.apicurio.registry.utils.converter.AvroConverter
      VALUE_CONVERTER: io.apicurio.registry.utils.converter.AvroConverter
      CONNECT_KEY_CONVERTER_APICURIO_REGISTRY_URL: http://schema-registry:8080/apis/registry/v2
      CONNECT_KEY_CONVERTER_APICURIO_REGISTRY_AUTO_REGISTER: "true"
      CONNECT_KEY_CONVERTER_APICURIO_REGISTRY_FIND_LATEST: "true"
      CONNECT_KEY_CONVERTER_APICURIO_REGISTRY_AS_CONFLUENT: "true"
      CONNECT_VALUE_CONVERTER_APICURIO_REGISTRY_URL: http://schema-registry:8080/apis/registry/v2
      CONNECT_VALUE_CONVERTER_APICURIO_REGISTRY_AUTO_REGISTER: "true"
      CONNECT_VALUE_CONVERTER_APICURIO_REGISTRY_FIND_LATEST: "true"
      CONNECT_VALUE_CONVERTER_APICURIO_REGISTRY_AS_CONFLUENT: "true"
      CONNECT_SCHEMA_NAME_ADJUSTMENT_MODE: avro
      REST_ADVERTISED_HOST_NAME: debezium-connect
      CONNECT_PLUGIN_PATH: /kafka/connect

  grafana:
    profiles: ["full"]
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.4.0}
    ports:
      - "${GRAFANA_EXTERNAL_PORT:-3000}:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      CLICKHOUSE_GRAFANA_URL: ${CLICKHOUSE_GRAFANA_URL:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-taobao_behavior}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  clickhouse_data:
  cassandra_data:
  postgres_data:
