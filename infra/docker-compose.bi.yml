# =============================================================
#  Overlay: BI (Metabase) — bật khi cần dashboard
#  Mem: ~800 MB (heap 512 MB)
#  Run:
#    docker compose \
#      -f infra/docker-compose.yml \
#      -f infra/docker-compose.bi.yml \
#      --env-file .env up -d
# =============================================================

services:
  metabase:
    image: metabase/metabase:v0.47.7
    container_name: metabase
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      # Ép JVM heap Metabase xuống 512MB (default 1GB)
      JAVA_OPTS: "-Xms256m -Xmx512m"
      MB_JETTY_HOST: 0.0.0.0
    volumes:
      - metabase_data:/metabase-data
    networks:
      - realtime_network
    depends_on:
      postgresql:
        condition: service_healthy
    mem_limit: 800m
    mem_reservation: 640m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  metabase_data:

networks:
  realtime_network:
    external: false
