# =============================================================
#  Grafana Datasource — ClickHouse
#  For local development: connects to ClickHouse container
#  For Cloud: use Grafana Cloud UI to add ClickHouse datasource
# =============================================================

apiVersion: 1

datasources:
  - name: ClickHouse-F1
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    database: f1_telemetry
    jsonData:
      defaultDatabase: f1_telemetry
      port: 8123
      protocol: http
      secure: false
      tlsSkipVerify: true
      username: default
    secureJsonData:
      password: ''
    isDefault: true
    editable: true
