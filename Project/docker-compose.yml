services:

  # ═══════════════════════════════════════════════════
  # ZOOKEEPER — Quản lý metadata cho Kafka
  # ═══════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_logs:/var/lib/zookeeper/log
    networks:
      - realtime_network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════
  # KAFKA — Message broker nhận dữ liệu từ Producer
  # ═══════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST  → kết nối từ máy host  (localhost:9092)
      # PLAINTEXT       → kết nối nội bộ Docker  (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - realtime_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════
  # POSTGRESQL — Lưu trữ dữ liệu đã xử lý
  # ═══════════════════════════════════════════════════
  postgresql:
    image: postgres:15
    container_name: postgres-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: fuel_prices
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Tất cả *.sql trong thư mục script/ sẽ chạy tự động khi container start lần đầu
      - ./script:/docker-entrypoint-initdb.d
    networks:
      - realtime_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fuel_prices"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════
  # METABASE — Dashboard & trực quan hóa dữ liệu
  # ═══════════════════════════════════════════════════
  metabase:
    image: metabase/metabase:v0.47.7
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    networks:
      - realtime_network
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  zk_data:
  zk_logs:
  kafka_data:
  pgdata:
  metabase_data:

networks:
  realtime_network:
    driver: bridge