# =============================================================================
# F1 Live Telemetry Streaming Platform — GitLab CI/CD
# Pipeline: build → test → security (SAST / Secret / Dependency Scanning)
# =============================================================================

stages:
  - build
  - test
  - security

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  DS_JAVA_VERSION: "11"

default:
  image: maven:3.9-eclipse-temurin-11
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
  interruptible: true

# ---- GitLab security templates -----------------------------------------------
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

# ---- Build (2 modules: f1-replay-engine + f1-telemetry-job) -----------------
build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests clean package
  artifacts:
    paths:
      - "data-generators/f1-replay-engine/target/*.jar"
      - "flink-jobs/f1-telemetry-job/target/*.jar"
    expire_in: 1 week

# ---- Unit tests ---------------------------------------------------------------
test:
  stage: test
  needs: ["build"]
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - "**/target/surefire-reports/TEST-*.xml"
    expire_in: 1 week

# ---- Security scans -----------------------------------------------------------
sast:
  stage: security
  needs: []

secret_detection:
  stage: security
  needs: []

