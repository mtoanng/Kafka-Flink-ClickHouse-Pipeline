# Taobao platform CI: build, test, Terraform validation, and security scans.

stages:
  - build
  - test
  - validate
  - security

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  DS_JAVA_VERSION: "11"

default:
  image: maven:3.9-eclipse-temurin-11
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
  interruptible: true

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    paths:
      - "flink-jobs/taobao-stream-job/target/*.jar"
    expire_in: 1 week

maven_tests:
  stage: test
  needs: ["build"]
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - "**/target/surefire-reports/TEST-*.xml"
    expire_in: 1 week

python_tests:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --disable-pip-version-check ruff
    - PYTHONPATH=producer/src python -m unittest discover -s producer/tests -v
    - ruff check producer scripts
    - ruff format --check producer scripts

terraform_validate:
  stage: validate
  image: hashicorp/terraform:1.9
  script:
    - terraform -chdir=infra/terraform fmt -check
    - terraform -chdir=infra/terraform init -backend=false -input=false
    - terraform -chdir=infra/terraform validate

static_contracts:
  stage: validate
  image: python:3.12-slim
  script:
    - python -c "import json; from pathlib import Path; [json.load(open(path)) for path in ['infra/grafana/provisioning/dashboards/json/taobao-overview.json', 'infra/debezium/postgres-behavior-rules.json', *map(str, Path('schemas').glob('*.avsc'))]]"
    - python -c "from pathlib import Path; ddl=Path('infra/clickhouse/schema.sql').read_text(); assert 'ReplacingMergeTree(record_version)' in ddl and 'invalid_behavior_events' in ddl and 'late_behavior_events' in ddl and 'behavior_alerts' in ddl; cql=Path('infra/cassandra/schema.cql').read_text(); assert 'PRIMARY KEY ((user_id), item_id)' in cql"
    - python -c "from pathlib import Path; import re; missing=[]; [missing.append((str(path), target)) for path in Path('.').rglob('*.md') if 'archive' not in path.parts and 'evidence' not in path.parts for target in re.findall(r'\[[^]]+\]\(([^)#]+)', path.read_text(encoding='utf-8')) if not target.startswith(('http://', 'https://', 'mailto:')) and not (path.parent / target).exists()]; assert not missing, missing"
    - python -c "from pathlib import Path; forbidden=[path for path in Path('.').rglob('*') if path.is_file() and ('secure-connect-' in path.name or path.name == '.env') and '.git' not in path.parts]; assert not forbidden, forbidden"

compose_validate:
  stage: validate
  image: docker:27-cli
  script:
    - docker compose -f infra/docker-compose.yml --profile core config --quiet
    - docker compose -f infra/docker-compose.yml --profile full config --quiet
