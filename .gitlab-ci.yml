# Taobao platform CI: build, test, Terraform validation, and security scans.

stages:
  - build
  - test
  - validate
  - security

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  DS_JAVA_VERSION: "11"

default:
  image: maven:3.9-eclipse-temurin-11
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
  interruptible: true

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

build:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    paths:
      - "flink-jobs/taobao-stream-job/target/*.jar"
    expire_in: 1 week

maven_tests:
  stage: test
  needs: ["build"]
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit:
        - "**/target/surefire-reports/TEST-*.xml"
    expire_in: 1 week

python_tests:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --disable-pip-version-check ruff
    - PYTHONPATH=producer/src python -m unittest discover -s producer/tests -v
    - ruff check producer scripts
    - ruff format --check producer scripts

terraform_validate:
  stage: validate
  image: hashicorp/terraform:1.9
  script:
    - terraform -chdir=infra/terraform fmt -check
    - terraform -chdir=infra/terraform init -backend=false -input=false
    - terraform -chdir=infra/terraform validate
